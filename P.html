<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REX-EYE IQ CHALLENGE: Overdrive Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #0a0c0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .test-container {
            max-width: 800px;
            width: 100%;
            background: #13161c;
            border-radius: 32px;
            border: 1px solid #2a2f3a;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        .header {
            padding: 24px 28px;
            background: #1a1e26;
            border-bottom: 1px solid #2a2f3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h1 {
            color: #e8eef2;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .logo span {
            color: #6c5ce7;
            font-weight: 700;
            background: rgba(108,92,231,0.15);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 14px;
            margin-left: 12px;
        }
        .timer {
            background: #00000030;
            padding: 10px 20px;
            border-radius: 60px;
            border: 1px solid #333b48;
            color: #b7c0cc;
            font-weight: 600;
            font-size: 20px;
        }
        .timer.warning {
            color: #ff7675;
            border-color: #ff767550;
        }
        .content {
            padding: 32px 28px;
        }
        .stats {
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
            color: #8e9aaf;
            font-size: 15px;
        }
        .progress-bar {
            background: #222831;
            height: 8px;
            border-radius: 20px;
            margin: 20px 0 30px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6c5ce7, #a463f5);
            border-radius: 20px;
            transition: width 0.3s ease;
        }
        .question-box {
            background: #1a1e26;
            border-radius: 24px;
            padding: 28px;
            border: 1px solid #2e3540;
            margin-bottom: 28px;
        }
        .question-text {
            color: #f1f5f9;
            font-size: 22px;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 32px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .option-btn {
            background: #222831;
            border: 1px solid #333b48;
            border-radius: 60px;
            padding: 16px 20px;
            color: #ccd7e6;
            font-size: 18px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s;
        }
        .option-btn:hover {
            background: #2a313c;
            border-color: #5f6b7f;
        }
        .option-btn.selected {
            background: #6c5ce7;
            border-color: #8b7cf0;
            color: white;
        }
        .voice-section {
            background: #0f1219;
            border-radius: 24px;
            padding: 24px;
            margin-top: 24px;
            border: 1px solid #2f3542;
        }
        .voice-title {
            color: #a4b0be;
            font-size: 18px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .voice-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .record-btn {
            background: #2c2f36;
            border: none;
            color: #e0e4ec;
            padding: 14px 30px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: 1px solid #414a58;
            transition: 0.1s;
        }
        .record-btn.recording {
            background: #c44545;
            color: white;
            border-color: #ff8a8a;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } }
        .transcript-box {
            flex: 1;
            min-width: 250px;
            background: #1b2029;
            border: 1px solid #353f4e;
            border-radius: 30px;
            padding: 14px 20px;
            color: #d3deed;
            font-size: 16px;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }
        .nav-btn {
            background: transparent;
            border: 1px solid #384153;
            color: #cbd5e1;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.1s;
        }
        .nav-btn.primary {
            background: #6c5ce7;
            border-color: #8675f0;
            color: white;
        }
        .nav-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        /* HISTORY STYLES */
        .history-section {
            margin-top: 40px;
            background: #1a1e26;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #2e3540;
        }
        .history-title {
            color: #e8eef2;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .history-item {
            background: #0f1219;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #b7c0cc;
            font-size: 13px;
            border: 1px solid #2a2f3a;
        }
        .history-item span.score {
            color: #6c5ce7;
            font-weight: 700;
            font-size: 16px;
        }
        .footer-note {
            text-align: center;
            color: #5c6a7d;
            margin-top: 32px;
            font-size: 14px;
            border-top: 1px dashed #262e38;
            padding-top: 24px;
        }
    </style>
</head>
<body>
<div class="test-container">
    <div class="header">
        <div class="logo">
            <h1>🧠 REX·IQ <span>CHALLENGE</span></h1>
        </div>
        <div class="timer" id="timerDisplay">25:00</div>
    </div>
    <div class="content">
        <div class="stats">
            <span>📊 Soal <span id="currentQ">1</span>/<span id="totalQ">15</span></span>
            <span>🎤 Lisan tersimpan: <span id="voiceCount">0</span>/15</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

        <div class="question-box">
            <div class="question-text" id="questionText">Memuat soal...</div>
            <div class="options-grid" id="optionsContainer"></div>
        </div>

        <div class="voice-section">
            <div class="voice-title">🎙️ JAWABAN LISAN</div>
            <div class="voice-controls">
                <button class="record-btn" id="recordBtn"><span>🔴</span> Mulai Rekam</button>
                <div class="transcript-box" id="transcriptDisplay">- Belum ada rekaman -</div>
            </div>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" disabled>← Sebelumnya</button>
            <button class="nav-btn primary" id="nextBtn">Selanjutnya →</button>
        </div>

        <div class="history-section">
            <div class="history-title">📜 HISTORI SKOR</div>
            <div id="historyList">
                <p style="color:#5c6a7d; font-size:13px;">Belum ada riwayat tes.</p>
            </div>
            <button onclick="hapusHistori()" style="background:none; border:none; color:#ff7675; cursor:pointer; font-size:11px; margin-top:10px;">🗑️ Hapus Semua Riwayat</button>
        </div>

        <div class="footer-note">
            ⚡ Tes ini menggabungkan kognitif dan verbal (REX-EYE Simulasi).
        </div>
    </div>
</div>

<script>
    (function(){
        const totalSoal = 15;
        const waktuMenit = 25;
        let jawabanPilihan = new Array(totalSoal).fill(null);
        let jawabanLisan = new Array(totalSoal).fill(null);
        let currentIndex = 0;
        let detik = waktuMenit * 60;
        let timerInterval;
        let isRecording = false;
        let recognition;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'id-ID';
        }

        const timerEl = document.getElementById('timerDisplay');
        const currentQEl = document.getElementById('currentQ');
        const progressFill = document.getElementById('progressFill');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const transcriptDisplay = document.getElementById('transcriptDisplay');
        const voiceCountSpan = document.getElementById('voiceCount');
        const recordBtn = document.getElementById('recordBtn');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');

        const soalList = [
            { soal: "Jika 3 apel + 2 jeruk = 23, dan 2 apel + 3 jeruk = 22, berapa harga 1 apel?", opsi: ["A. 3", "B. 4", "C. 5", "D. 6"], benar: 3 },
            { soal: "Mana yang tidak termasuk kelompok: a) Kucing, b) Anjing, c) Kuda, d) Semangka", opsi: ["A. Kucing", "B. Anjing", "C. Kuda", "D. Semangka"], benar: 4 },
            { soal: "Jika hari ini adalah Rabu, 60 hari lagi hari apa?", opsi: ["A. Senin", "B. Selasa", "C. Rabu", "D. Kamis"], benar: 2 },
            { soal: "Lengkapi deret: 2, 6, 12, 20, ?", opsi: ["A. 28", "B. 30", "C. 32", "D. 36"], benar: 2 },
            { soal: "Sisi mana yang paling berbeda? 🔺 🔵 🔺 🔵 🔺", opsi: ["A. 🔺 pertama", "B. 🔵 pertama", "C. 🔺 ketiga", "D. Tidak ada"], benar: 2 },
            { soal: "Sebuah mobil melaju 60 km/jam. Berapa km ditempuh dalam 2,5 jam?", opsi: ["A. 120", "B. 130", "C. 150", "D. 180"], benar: 3 },
            { soal: "Kata 'PENSIL' dibalik menjadi 'LISNEP'. Lalu 'SEPATU' dibalik jadi?", opsi: ["A. UTAPES", "B. UTAEPS", "C. SEPUTA", "D. APESTU"], benar: 1 },
            { soal: "1/4 + 2/3 = ?", opsi: ["A. 3/7", "B. 11/12", "C. 5/12", "D. 8/15"], benar: 2 },
            { soal: "Jika semua A adalah B, dan semua B adalah C, maka...", opsi: ["A. Semua A pasti C", "B. Semua C pasti A", "C. Ada A bukan C", "D. Tidak pasti"], benar: 1 },
            { soal: "Luas lingkaran dengan jari-jari 7 cm? (π≈22/7)", opsi: ["A. 144 cm²", "B. 154 cm²", "C. 164 cm²", "D. 174 cm²"], benar: 2 },
            { soal: "Mana yang paling tepat: a) Semua pria bisa mati, b) Socrates pria, c) Socrates bisa mati. Ini contoh...", opsi: ["A. Deduksi", "B. Induksi", "C. Abduksi", "D. Fallacy"], benar: 1 },
            { soal: "Jika * berarti ×, # berarti +, maka 4 * 2 # 3 = ?", opsi: ["A. 11", "B. 14", "C. 20", "D. 9"], benar: 1 },
            { soal: "Kata 'TANGAN' berhubungan dengan 'JARI' seperti 'KAKI' berhubungan dengan...", opsi: ["A. LUTUT", "B. TUMIT", "C. JARI KAKI", "D. SENDAL"], benar: 3 },
            { soal: "Sebuah koin dilempar 3 kali. Peluang muncul gambar minimal 2 kali?", opsi: ["A. 1/2", "B. 1/4", "C. 3/8", "D. 3/4"], benar: 1 },
            { soal: "Yang bukan bilangan prima: 13, 17, 19, 21", opsi: ["A. 13", "B. 17", "C. 19", "D. 21"], benar: 4 }
        ];

        function startTimer() {
            timerInterval = setInterval(() => {
                if (detik > 0) {
                    detik--;
                    let m = Math.floor(detik/60), s = detik%60;
                    timerEl.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                    if (detik <= 60) timerEl.classList.add('warning');
                } else {
                    clearInterval(timerInterval);
                    alert("WAKTU HABIS!");
                    resetSemua();
                }
            }, 1000);
        }

        function renderSoal(idx) {
            const s = soalList[idx];
            questionText.textContent = `${idx+1}. ${s.soal}`;
            optionsContainer.innerHTML = s.opsi.map((o, i) => `
                <div class="option-btn ${jawabanPilihan[idx] === i ? 'selected' : ''}" onclick="pilih(${i})">${o}</div>
            `).join('');
            transcriptDisplay.textContent = jawabanLisan[idx] || '- Belum ada rekaman -';
            currentQEl.textContent = idx + 1;
            progressFill.style.width = `${((idx+1)/totalSoal)*100}%`;
            prevBtn.disabled = idx === 0;
            nextBtn.textContent = idx === totalSoal-1 ? 'Selesai & Lihat Skor' : 'Selanjutnya →';
            updateVoiceCount();
        }

        window.pilih = (i) => {
            jawabanPilihan[currentIndex] = i;
            renderSoal(currentIndex);
        };

        function updateVoiceCount() {
            voiceCountSpan.textContent = jawabanLisan.filter(v => v).length;
        }

        recordBtn.onclick = () => {
            if (!recognition) return alert("Browser tidak support Voice!");
            if (isRecording) {
                recognition.stop();
            } else {
                recognition.start();
                isRecording = true;
                recordBtn.classList.add('recording');
                recordBtn.innerHTML = '<span>⏹️</span> Stop Rekam';
                transcriptDisplay.textContent = "🎤 Mendengarkan...";
            }
        };

        if(recognition) {
            recognition.onresult = (e) => {
                jawabanLisan[currentIndex] = e.results[0][0].transcript;
                renderSoal(currentIndex);
                stopRec();
            };
            recognition.onerror = () => stopRec();
            recognition.onend = () => stopRec();
        }

        function stopRec() {
            isRecording = false;
            recordBtn.classList.remove('recording');
            recordBtn.innerHTML = '<span>🔴</span> Mulai Rekam';
        }

        nextBtn.onclick = () => {
            if (currentIndex < totalSoal - 1) {
                currentIndex++;
                renderSoal(currentIndex);
            } else {
                finish();
            }
        };

        prevBtn.onclick = () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderSoal(currentIndex);
            }
        };

        function finish() {
            let benar = 0;
            jawabanPilihan.forEach((j, i) => { if(j === soalList[i].benar-1) benar++; });
            let mc = Math.round((benar/totalSoal)*100);
            let lisan = Math.min(100, (jawabanLisan.filter(v=>v).length * 7));
            let total = Math.round((mc * 0.6) + (lisan * 0.4));
            
            alert(`Tes Selesai!\nSkor Akhir: ${total}`);
            simpanHistori(total, mc, lisan);
            resetSemua();
        }

        function simpanHistori(skor, mc, lisan) {
            let h = JSON.parse(localStorage.getItem('rex_iq_history') || '[]');
            h.unshift({ skor, detail: `MC: ${mc} | Lisan: ${lisan}`, waktu: new Date().toLocaleString('id-ID') });
            localStorage.setItem('rex_iq_history', JSON.stringify(h.slice(0, 5)));
            tampilkanHistori();
        }

        function tampilkanHistori() {
            let h = JSON.parse(localStorage.getItem('rex_iq_history') || '[]');
            const container = document.getElementById('historyList');
            if (h.length === 0) {
                container.innerHTML = '<p style="color:#5c6a7d; font-size:13px;">Belum ada riwayat.</p>';
                return;
            }
            container.innerHTML = h.map(i => `
                <div class="history-item">
                    <div><strong>${i.waktu}</strong><br><small>${i.detail}</small></div>
                    <span class="score">${i.skor}</span>
                </div>
            `).join('');
        }

        window.hapusHistori = () => {
            localStorage.removeItem('rex_iq_history');
            tampilkanHistori();
        };

        function resetSemua() {
            jawabanPilihan.fill(null);
            jawabanLisan.fill(null);
            currentIndex = 0;
            detik = waktuMenit * 60;
            renderSoal(0);
        }

        renderSoal(0);
        startTimer();
        tampilkanHistori();
    })();
</script>
</body>
</html>
