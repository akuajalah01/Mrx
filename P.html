
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REX·IQ CHALLENGE: WhatsApp Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0a0c0f; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: #e8eef2; }
        .test-container { max-width: 800px; width: 100%; background: #13161c; border-radius: 32px; border: 1px solid #2a2f3a; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8); overflow: hidden; }
        .header { padding: 24px 28px; background: #1a1e26; border-bottom: 1px solid #2a2f3a; display: flex; justify-content: space-between; align-items: center; }
        .logo h1 { font-size: 24px; font-weight: 600; }
        .logo span { color: #25D366; font-weight: 700; background: rgba(37,211,102,0.1); padding: 4px 12px; border-radius: 40px; font-size: 14px; margin-left: 12px; }
        .timer { background: #00000030; padding: 10px 20px; border-radius: 60px; border: 1px solid #333b48; font-weight: 600; font-size: 20px; }
        .content { padding: 32px 28px; }
        .progress-bar { background: #222831; height: 8px; border-radius: 20px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: #25D366; transition: width 0.3s ease; }
        .question-box { background: #1a1e26; border-radius: 24px; padding: 28px; border: 1px solid #2e3540; margin-bottom: 20px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .option-btn { background: #222831; border: 1px solid #333b48; border-radius: 60px; padding: 14px; color: #ccd7e6; cursor: pointer; transition: 0.2s; text-align: center; }
        .option-btn.selected { background: #25D366; color: black; border-color: #25D366; font-weight: bold; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 20px; }
        .nav-btn { background: #2c2f36; border: 1px solid #414a58; color: white; padding: 12px 24px; border-radius: 40px; cursor: pointer; }
        .btn-wa { background: #25D366; color: black; font-weight: bold; border: none; padding: 15px; border-radius: 40px; width: 100%; cursor: pointer; margin-top: 20px; display: none; }
        .history-section { margin-top: 30px; border-top: 1px solid #2a2f3a; padding-top: 20px; }
        .history-item { background: #0f1219; padding: 10px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; font-size: 12px; }
    </style>
</head>
<body>
<div class="test-container">
    <div class="header">
        <div class="logo"><h1>🧠 REX·IQ <span>WHATSAPP</span></h1></div>
        <div id="timerDisplay" class="timer">25:00</div>
    </div>
    <div class="content">
        <div id="quizArea">
            <p>Soal <span id="currentQ">1</span>/15</p>
            <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
            <div class="question-box">
                <h2 id="questionText">Memuat soal...</h2>
                <div id="optionsContainer" class="options-grid"></div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" id="prevBtn" disabled>←</button>
                <button class="nav-btn" id="nextBtn">Selanjutnya</button>
            </div>
        </div>

        <div id="resultArea" style="display:none; text-align:center;">
            <h2>TES SELESAI!</h2>
            <h1 id="totalScore" style="font-size: 64px; color: #25D366; margin: 20px 0;">0</h1>
            <button class="btn-wa" id="waBtn">📲 KIRIM HASIL KE WHATSAPP</button>
            <button onclick="location.reload()" style="background:none; border:none; color:white; cursor:pointer; margin-top:20px;">Ulangi Tes</button>
        </div>

        <div class="history-section">
            <p>📜 RIWAYAT SKOR</p>
            <div id="historyList"></div>
        </div>
    </div>
</div>

<script>
    const soalList = [
        { q: "3 apel + 2 jeruk = 23, 2 apel + 3 jeruk = 22. Harga 1 apel?", opt: ["3", "4", "5", "6"], a: 2 }, // C (indeks 2)
        { q: "Mana yang bukan hewan?", opt: ["Kucing", "Anjing", "Kuda", "Semangka"], a: 3 },
        { q: "Rabu + 60 hari = ?", opt: ["Senin", "Selasa", "Rabu", "Kamis"], a: 1 },
        { q: "Deret: 2, 6, 12, 20, ?", opt: ["28", "30", "32", "36"], a: 1 },
        { q: "Sisi paling beda? 🔺 🔵 🔺 🔵 🔺", opt: ["A", "B", "C", "D"], a: 1 },
        { q: "60 km/jam x 2.5 jam = ?", opt: ["120", "130", "150", "180"], a: 2 },
        { q: "Kebalikan 'SEPATU'?", opt: ["UTAPES", "UTAEPS", "SEPUTA", "APESTU"], a: 0 },
        { q: "1/4 + 2/3 = ?", opt: ["3/7", "11/12", "5/12", "8/15"], a: 1 },
        { q: "Semua A=B, B=C. Maka?", opt: ["A=C", "C=A", "Bukan A", "Nol"], a: 0 },
        { q: "Luas lingkaran r=7? (22/7)", opt: ["144", "154", "164", "174"], a: 1 },
        { q: "Socrates pria, Pria mati. Ini?", opt: ["Deduksi", "Induksi", "Abduksi", "Mitos"], a: 0 },
        { q: "4 * 2 + 3 = ?", opt: ["11", "14", "20", "9"], a: 0 },
        { q: "Tangan:Jari = Kaki:?", opt: ["Lutut", "Tumit", "Jari Kaki", "Sandal"], a: 2 },
        { q: "Koin 3x, Peluang min 2 gambar?", opt: ["1/2", "1/4", "3/8", "3/4"], a: 0 },
        { q: "Bukan bilangan prima?", opt: ["13", "17", "19", "21"], a: 3 }
    ];

    let current = 0, answers = new Array(15).fill(null), time = 1500;

    function render() {
        const s = soalList[current];
        document.getElementById('questionText').innerText = s.q;
        document.getElementById('currentQ').innerText = current + 1;
        document.getElementById('progressFill').style.width = ((current+1)/15)*100 + "%";
        document.getElementById('optionsContainer').innerHTML = s.opt.map((o, i) => 
            `<div class="option-btn ${answers[current]===i?'selected':''}" onclick="setAns(${i})">${o}</div>`).join('');
        document.getElementById('prevBtn').disabled = current === 0;
        document.getElementById('nextBtn').innerText = current === 14 ? "Selesai" : "Selanjutnya";
    }

    window.setAns = (i) => { answers[current] = i; render(); };

    document.getElementById('nextBtn').onclick = () => {
        if(current < 14) { current++; render(); } 
        else { finish(); }
    };
    document.getElementById('prevBtn').onclick = () => { current--; render(); };

    function finish() {
        let score = 0;
        answers.forEach((ans, i) => { if(ans === soalList[i].a) score++; });
        let finalScore = Math.round((score/15)*100);
        document.getElementById('quizArea').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('totalScore').innerText = finalScore;
        document.getElementById('waBtn').style.display = 'block';
        
        let h = JSON.parse(localStorage.getItem('rex_wa_hist') || '[]');
        h.unshift({s: finalScore, d: new Date().toLocaleString()});
        localStorage.setItem('rex_wa_hist', JSON.stringify(h.slice(0,5)));
        showHist();

        document.getElementById('waBtn').onclick = () => {
            let msg = `*REX-IQ CHALLENGE RESULTS*\n--------------------------\nSkor: ${finalScore}/100\nBenar: ${score} dari 15 soal\nWaktu: ${document.getElementById('timerDisplay').innerText}\nStatus: Selesai\n--------------------------`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        };
    }

    function showHist() {
        let h = JSON.parse(localStorage.getItem('rex_wa_hist') || '[]');
        document.getElementById('historyList').innerHTML = h.map(x => 
            `<div class="history-item"><span>${x.d}</span><strong>Skor: ${x.s}</strong></div>`).join('');
    }

    setInterval(() => {
        if(time > 0) {
            time--;
            let m = Math.floor(time/60), s = time%60;
            document.getElementById('timerDisplay').innerText = `${m}:${s<10?'0'+s:s}`;
        }
    }, 1000);

    render(); showHist();
</script>
</body>
</html>
